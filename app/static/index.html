<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词查背一体</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <svg class="brand-mark" width="30" height="26" viewBox="0 0 30 26" fill="none" aria-hidden="true">
                <path d="M15 5C12 2.5 7.5 2 3 3v17c4.5-1 9-0.5 12 2 3-2.5 7.5-3 12-2V3c-4.5-1-9-0.5-12 2z"
                      stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M15 5v17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <div class="brand-text">
                <h1>英语单词查背一体</h1>
                <p class="tagline">贴句子 · 记生词 · 温故知新</p>
            </div>
        </div>
        <nav class="tabs">
            <button class="tab-btn active" data-tab="translate">翻译</button>
            <button class="tab-btn" data-tab="vocab">单词本 <span id="vocabCount"></span></button>
        </nav>
    </header>

    <main>
        <section id="translate-tab" class="tab-panel active">
            <form id="translateForm">
                <textarea
                    id="sentenceInput"
                    placeholder="粘贴或输入一句英文…（最多 1000 字符）"
                    maxlength="1000"
                    required
                ></textarea>
                <div class="row">
                    <button type="submit" id="translateBtn">翻译并分析</button>
                    <button type="button" id="clearBtn">清空</button>
                </div>
            </form>

            <div id="status" class="status" hidden>
                <span class="spinner"></span>
                <span id="statusText">分析中…</span>
            </div>

            <div id="error" class="error" hidden></div>

            <div id="result" hidden>
                <div class="card translation-card">
                    <h3>原句</h3>
                    <p id="sentenceRendered" class="sentence"></p>
                    <h3>翻译</h3>
                    <p id="translationText" class="translation"></p>
                    <p class="hint">💡 提示：点击原句中任意单词查询；拖选多个词可查词组；高亮的词/词组是 AI 推荐重点。</p>
                </div>

                <h3 class="section-title">关键词</h3>
                <div id="keyWords" class="key-words"></div>
            </div>

            <div id="popover" class="popover" hidden></div>
            <button type="button" id="phraseLookupBtn" class="phrase-lookup-btn" hidden></button>
        </section>

        <section id="vocab-tab" class="tab-panel">
            <div class="vocab-controls">
                <input
                    type="search"
                    id="vocabSearch"
                    placeholder="搜索单词 / 释义…"
                    maxlength="100"
                >
                <span id="vocabTotal" class="hint"></span>
            </div>
            <div id="vocabList" class="vocab-list"></div>
            <div id="vocabPager" class="pager" hidden>
                <button id="prevPage">← 上一页</button>
                <span id="pageInfo"></span>
                <button id="nextPage">下一页 →</button>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
